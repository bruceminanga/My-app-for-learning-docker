services:
  db:
    image: postgres:16-alpine
    # 1. Point the DB to the exact same env file as the backend
    # Make sure backend/.env contains POSTGRES_DB, POSTGRES_USER, and POSTGRES_PASSWORD
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: backend/
    # 2. Added `makemigrations` so Django generates the files before migrating
    # command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    command: >
      sh -c "python manage.py makemigrations && 
      python manage.py migrate && 
      python manage.py createsuperuser --noinput || true && 
      python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app:z
    depends_on:
      db:
        condition: service_healthy 

  frontend:
    build: 
      context: frontend/
      target: builder 
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: