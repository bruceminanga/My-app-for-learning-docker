name: my-app-prod
services:
  db:
    image: postgres:16-alpine@sha256:b89a4e92591810eac1fbce6107485d7c6b9449df51c1ccfcfed514a7fdd69955
    env_file:
      - backend/.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No ports — db is not reachable from outside the compose network

  backend:
    build:
      context: backend/
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        VERSION: ${VERSION:-1.0.0}
    # No command override — Dockerfile CMD owns this in production
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: frontend/
      dockerfile: Dockerfile
    ports:
    - "8080:80"
    env_file:
      - frontend/.env.dev
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data: